<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Document</title>

<style>

/* 🔥 on neutralise TOUT le layout navigateur */
html{
margin:0;
padding:0;
height:100%;
background:#000;
}

body{
margin:0;
padding:0;
min-height:100%;
background:#000;

/* CRUCIAL : supprime les comportements de centrage implicites */
display:block;
width:100%;
overflow-x:hidden;
}

/* sécurité anti UI browser mobile */
*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* 🔥 wrapper inutile supprimé volontairement */

/* IMAGE FULL BLEED STRICT */
img{
display:block !important;

width:100% !important;
max-width:100% !important;
min-width:100% !important;

height:auto;

border:0;

margin:0;
padding:0;

vertical-align:top;

user-select:none;
-webkit-user-drag:none;

/* évite les effets de “letterbox” sur certains Android */
object-fit:contain;

background:#000;

/* améliore netteté perçue */
image-rendering:auto;

transform:translateZ(0);
}

/* désactive tout scroll horizontal système */
html, body{
overflow-x:hidden;
}

</style>
</head>

<body>

<img src="Guide AP Paquet scellé WotD.png" alt="document">

</body>
</html>
