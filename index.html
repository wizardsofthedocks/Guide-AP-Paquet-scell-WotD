<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Guide</title>

<style>

:root{
--bg:#050505;
}

html, body{
margin:0 !important;
padding:0 !important;
width:100% !important;
overflow-x:hidden;
background:var(--bg);
}

/* 🔥 KILL GITHUB PAGES CONTAINERS */
.container,
.markdown-body,
main,
.content,
.page-content{
max-width:none !important;
width:100vw !important;
margin:0 !important;
padding:0 !important;
}

/* reset global */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
animation:fadeIn .7s ease-out;
}

/* full bleed réel */
.full-bleed{
width:100vw;
margin-left:calc(50% - 50vw);
}

/* image */
img{
display:block;
width:100vw;
max-width:100vw;
height:auto;

user-select:none;
-webkit-user-drag:none;
touch-action:pan-y pinch-zoom;

transform:translateZ(0);

filter:contrast(1.03) brightness(1.01);

box-shadow:0 0 24px rgba(0,0,0,.18);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(8px);}
to{opacity:1; transform:none;}
}

@media (max-width:768px){
img{
box-shadow:0 0 16px rgba(0,0,0,.12);
}
}

</style>
</head>

<body>

<div class="full-bleed">
  <img src="Guide%20AP%20Paquet%20scell%C3%A9%20WotD.png" alt="Guide">
</div>

</body>
</html>
