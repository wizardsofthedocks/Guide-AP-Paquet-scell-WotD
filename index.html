<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Guide</title>

<style>
:root{
--bg:#050505;
}

html,
body{
margin:0;
padding:0;
width:100%;
overflow-x:hidden;
background:var(--bg);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
display:block;
animation:fadeIn .7s ease-out;
}

/* FULL BLEED corrigé */
.full-bleed{
width:100vw;
margin-left:calc(50% - 50vw);
}

/* IMAGE */
img{
display:block;
width:100%;
height:auto;

border:0;
margin:0;
padding:0;

vertical-align:top;

user-select:none;
-webkit-user-drag:none;
touch-action:pan-y pinch-zoom;

transform:translateZ(0);

filter:
contrast(1.03)
brightness(1.01);

box-shadow:
0 0 24px rgba(0,0,0,.18);

image-rendering:auto;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:none;
}
}

@media (max-width:768px){
img{
box-shadow:
0 0 16px rgba(0,0,0,.12);
}
}

</style>
</head>

<body>

<div class="full-bleed">
  <img src="Guide%20AP%20Paquet%20scell%C3%A9%20WotD.png" alt="Guide">
</div>

</body>
</html>
